<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>ADCB · CoP Payment Flow Prototype</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  @font-face { font-family: 'Proxima Nova'; src: url('assets/fonts/proximanova-regular.woff2') format('woff2'); font-weight: 400; font-display: swap; }
  @font-face { font-family: 'Proxima Nova'; src: url('assets/fonts/proximanova-semibold.woff2') format('woff2'); font-weight: 600; font-display: swap; }
  @font-face { font-family: 'Proxima Nova'; src: url('assets/fonts/proximanova-bold.woff2') format('woff2'); font-weight: 700; font-display: swap; }
  html, body { margin: 0; padding: 0; background: #f1f5f9; font-family: 'Proxima Nova', ui-sans-serif, -apple-system, system-ui, sans-serif; color: #0F172A; -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }
  button:focus { outline: none; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  @keyframes pulseRing { 0% { transform: scale(0.95); opacity: 0.7; } 100% { transform: scale(1.3); opacity: 0; } }
  @keyframes scanLine { 0% { top: 10%; } 50% { top: 90%; } 100% { top: 10%; } }
  @keyframes pop { 0% { transform: scale(0); } 60% { transform: scale(1.15); } 100% { transform: scale(1); } }
  @keyframes slideIn { from { opacity: 0; transform: translateX(18px); } to { opacity: 1; transform: translateX(0); } }
  ::-webkit-scrollbar { width: 0; height: 0; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
// Icons and brand marks — all original SVG, no third-party logos
const Icons = {
  back: (color = '#fff', size = 20) => (

    </svg>
  ),
  search: (color = '#94a3b8', size = 18) => (

  ),
  lock: (color = '#fff', size = 28) => (

  ),
  fingerprint: (color = '#0D9488', size = 46) => (
    <svg width={size} height={size} viewBox="0 0 48 48" fill="none" strokeLinecap="round">
      <path d="M16 36c-1-3-1.5-6-1.5-9 0-5 4.5-9 9.5-9s9.5 4 9.5 9" stroke={color} strokeWidth="2"/>
      <path d="M20 40c-1-3-1.5-6-1.5-9 0-3 2.5-5.5 5.5-5.5s5.5 2.5 5.5 5.5c0 2 0 4-.5 6" stroke={color} strokeWidth="2"/>
      <path d="M24 42c-.5-3-.5-6-.5-9 0-1 .5-1.5 1-1.5s.5 1 .5 2c0 2-.5 5-1 7" stroke={color} strokeWidth="2"/>

  ),
  faceId: (color = '#0D9488', size = 46) => (
    <svg width={size} height={size} viewBox="0 0 48 48" fill="none" strokeLinecap="round" strokeLinejoin="round">
      <path d="M8 14V10a2 2 0 012-2h4M40 14V10a2 2 0 00-2-2h-4M8 34v4a2 2 0 002 2h4M40 34v4a2 2 0 01-2 2h-4" stroke={color} strokeWidth="2.2"/>
      <circle cx="18" cy="21" r="1.3" fill={color}/>
      <circle cx="30" cy="21" r="1.3" fill={color}/>
      <path d="M24 20v7h-2" stroke={color} strokeWidth="1.8"/>
      <path d="M18 31c2 2 4 3 6 3s4-1 6-3" stroke={color} strokeWidth="1.8"/>

  ),
  shield: (color = '#fff', size = 18) => (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none">
      <path d="M12 3l8 3v6c0 5-3.5 8.5-8 9.5-4.5-1-8-4.5-8-9.5V6l8-3z" stroke={color} strokeWidth="1.8" strokeLinejoin="round"/>
    </svg>
  ),
  warning: (color = '#f59e0b', size = 18) => (

  ),
  xCircle: (color = '#ef4444', size = 18) => (

      <circle cx="12" cy="12" r="9" stroke={color} strokeWidth="1.8"/>

    </svg>
  ),
  rocket: (color = '#f97316', size = 22) => (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none">
      <path d="M12 2c4 3 6 7 6 11l-3 3-6 0-3-3c0-4 2-8 6-11z" stroke={color} strokeWidth="1.6" strokeLinejoin="round"/>
      <circle cx="12" cy="10" r="2" stroke={color} strokeWidth="1.6"/>

// Brand logos — ADCB, Al Tareq (payment rail), PayLink (TPP merchant)
const Brands = {
  // Al Tareq — UAE Open Finance API Hub (was Verify+)
  AlTareq: ({ color = '#0F172A', size = 1 }) => (
    <div style={{ display: 'flex', alignItems: 'center', gap: 7, transform: `scale(${size})`, transformOrigin: 'left center' }}>
      <svg width="28" height="28" viewBox="0 0 32 32">
        <defs>
          <linearGradient id="atg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stopColor="#0D9488"/>
            <stop offset="1" stopColor="#1C2B4A"/>
          </linearGradient>
        </defs>
        <circle cx="16" cy="16" r="15" fill="url(#atg)"/>
        {/* Arabic-inspired crescent + checkmark */}
        <path d="M10 16a6 6 0 1011 3.3" stroke="#fff" strokeWidth="2.2" fill="none" strokeLinecap="round"/>
        <path d="M13 15.5l2.3 2.3L21 12" stroke="#fff" strokeWidth="2.2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
      <div style={{ fontFamily: 'Proxima Nova, ui-sans-serif, system-ui', fontWeight: 800, fontSize: 18, color, letterSpacing: -0.4 }}>
        Al <span style={{ color: '#0D9488' }}>Tareq</span>
      </div>
    </div>
  ),
  // PayLink — the TPP merchant app (was Rocketpay)
  PayLink: ({ color = '#0F172A', size = 1 }) => (
    <div style={{ display: 'flex', alignItems: 'center', gap: 7, transform: `scale(${size})`, transformOrigin: 'left center' }}>
      <div style={{ width: 28, height: 28, borderRadius: 8, background: 'linear-gradient(135deg,#8B5CF6,#6D28D9)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M9 15a4 4 0 010-6l2-2a4 4 0 016 0M15 9a4 4 0 010 6l-2 2a4 4 0 01-6 0" stroke="#fff" strokeWidth="2" strokeLinecap="round"/>
        </svg>
      </div>
      <div style={{ fontFamily: 'Proxima Nova, ui-sans-serif, system-ui', fontWeight: 800, fontSize: 17, color: '#0F172A', letterSpacing: -0.4 }}>
        Pay<span style={{ color: '#6D28D9' }}>Link</span>
      </div>
    </div>
  ),
  // ADCB — user's bank (LFI) — was Meridian
  ADCB: ({ size = 1 }) => (
    <div style={{ display: 'flex', alignItems: 'center', gap: 8, transform: `scale(${size})`, transformOrigin: 'left center' }}>
      <svg width="28" height="28" viewBox="0 0 28 28">
        {/* ADCB-inspired mark: red shield with white chevron */}
        <path d="M14 2L3 6v8c0 6 4.5 10.5 11 12 6.5-1.5 11-6 11-12V6L14 2z" fill="#E31E24"/>
        <path d="M8 13l6-5 6 5-6 5-6-5z" fill="#fff"/>
      </svg>
      <div style={{ fontFamily: 'Proxima Nova, ui-sans-serif, system-ui', fontWeight: 800, fontSize: 17, color: '#0F172A', letterSpacing: 0.2 }}>
        ADCB
      </div>
    </div>
  ),
  // Smaller bank logos for the picker (ADCB + UAE banks)
  bankLogo: (key) => {
    const common = { width: 30, height: 30, borderRadius: 8, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontWeight: 800, fontSize: 11 };
    const styles = {
      adcb:     { background: '#E31E24' },
      enbd:     { background: '#C8102E' },
      fab:      { background: '#1D6FA4' },
      mashreq:  { background: '#F26522' },
      dib:      { background: '#0E7C3A' },
    };
    const letter = { adcb: 'ADCB', enbd: 'ENBD', fab: 'FAB', mashreq: 'MB', dib: 'DIB' };

window.Icons = Icons;
window.Brands = Brands;


// Phone — lightweight iOS-ish frame with interior scrolling content area
function Phone({ children, statusColor = 'dark' }) {
  const isDark = statusColor === 'light'; // light status = icons are light on dark header
  return (
    <div style={{
      width: 390, height: 820, borderRadius: 48, position: 'relative',
      background: '#000', padding: 10, boxSizing: 'border-box',
      boxShadow: '0 40px 80px rgba(15,23,42,0.25), 0 0 0 1px rgba(0,0,0,0.15)',
    }}>
      <div style={{
        width: '100%', height: '100%', borderRadius: 40, overflow: 'hidden',
        background: '#f8fafc', position: 'relative',
      }}>
        {/* Dynamic Island */}
        <div style={{
          position: 'absolute', top: 8, left: '50%', transform: 'translateX(-50%)',
          width: 110, height: 32, borderRadius: 20, background: '#000', zIndex: 100,
        }} />
        {/* Status bar — time + signal/wifi/batt */}
        <div style={{
          position: 'absolute', top: 0, left: 0, right: 0, height: 48,
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          padding: '18px 28px 0', zIndex: 90, pointerEvents: 'none',
          fontFamily: '-apple-system, "SF Pro", system-ui',
          fontWeight: 600, fontSize: 14,
          color: isDark ? '#fff' : '#0F172A',
        }}>
          <div>9:41</div>
          <div style={{ display: 'flex', gap: 5, alignItems: 'center' }}>
            <svg width="17" height="11" viewBox="0 0 17 11" fill={isDark ? '#fff' : '#0F172A'}>
              <rect x="0" y="7" width="3" height="4" rx="0.6"/>
              <rect x="4.5" y="5" width="3" height="6" rx="0.6"/>
              <rect x="9" y="2.5" width="3" height="8.5" rx="0.6"/>
              <rect x="13.5" y="0" width="3" height="11" rx="0.6"/>
            </svg>
            <svg width="15" height="11" viewBox="0 0 15 11" fill={isDark ? '#fff' : '#0F172A'}>
              <path d="M7.5 3C9.6 3 11.5 3.8 13 5l1-1A9 9 0 000 4l1 1c1.5-1.2 3.4-2 5.5-2z" opacity="0.9"/>
              <path d="M7.5 6c1.2 0 2.3.4 3.2 1.2l1-1A6 6 0 003.3 6.2l1 1c.9-.8 2-1.2 3.2-1.2z" opacity="0.9"/>
              <circle cx="7.5" cy="9.5" r="1.3"/>
            </svg>
            <svg width="25" height="11" viewBox="0 0 25 11">
              <rect x="0" y="0" width="22" height="11" rx="3" fill="none" stroke={isDark ? '#fff' : '#0F172A'} strokeOpacity="0.4"/>
              <rect x="1.5" y="1.5" width="19" height="8" rx="1.5" fill={isDark ? '#fff' : '#0F172A'}/>
              <rect x="23" y="3.5" width="1.5" height="4" rx="0.5" fill={isDark ? '#fff' : '#0F172A'} opacity="0.4"/>
            </svg>
          </div>
        </div>
        {/* Scrollable content area */}
        <div style={{ height: '100%', overflow: 'hidden', position: 'relative' }}>
          {children}
        </div>
        {/* Home indicator */}
        <div style={{
          position: 'absolute', bottom: 7, left: '50%', transform: 'translateX(-50%)',
          width: 130, height: 5, borderRadius: 3, background: 'rgba(0,0,0,0.35)', zIndex: 100,
          pointerEvents: 'none',
        }} />
      </div>
    </div>
  );
}

// Top bar used by screens (teal for TPP, orange for LFI, etc.)
function TopBar({ title, color, onBack, showBack = true }) {
  return (
    <div style={{
      background: color, height: 92, paddingTop: 48,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      position: 'relative', flexShrink: 0,
    }}>
      {showBack && (
        <button onClick={onBack} style={{
          position: 'absolute', left: 16, top: 52, background: 'none', border: 'none',
          cursor: 'pointer', padding: 6, display: 'flex',
        }}>
          {Icons.back('#fff', 22)}
        </button>
      )}
      <div style={{
        color: '#fff', fontFamily: 'ui-sans-serif, system-ui',
        fontWeight: 700, fontSize: 17, letterSpacing: 0.8,
      }}>{title}</div>
    </div>
  );
}

// Stepper — Consent / Authorize / Complete
function Stepper({ active, variant = 'dots' }) {
  // active: 0, 1, or 2
  const steps = ['Consent', 'Authorize', 'Complete'];
  const colors = {
    active: '#0D9488',
    done: '#0D9488',
    idle: '#cbd5e1',
  };
  return (
    <div style={{ padding: '18px 24px 22px', background: '#fff' }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', position: 'relative' }}>
        {/* Connecting line */}
        <div style={{
          position: 'absolute', left: '12%', right: '12%', top: 14,
          height: 2, background: '#e2e8f0', zIndex: 0,
        }} />
        <div style={{
          position: 'absolute', left: '12%', top: 14, height: 2,
          width: active === 0 ? 0 : active === 1 ? '38%' : '76%',
          background: colors.done, zIndex: 1, transition: 'width 0.45s ease',
        }} />
        {steps.map((label, i) => {
          const state = i < active ? 'done' : i === active ? 'active' : 'idle';
          return (
            <div key={i} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6, zIndex: 2, position: 'relative' }}>
              <div style={{
                width: 28, height: 28, borderRadius: 14,
                background: state === 'idle' ? '#fff' : colors[state],
                border: state === 'idle' ? '2px solid #cbd5e1' : 'none',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                color: state === 'idle' ? '#94a3b8' : '#fff',
                fontWeight: 700, fontSize: 13,
                boxShadow: state === 'active' ? '0 0 0 4px rgba(13,148,136,0.15)' : 'none',
                transition: 'all 0.3s',
              }}>
                {state === 'done' ? Icons.check('#fff', 14) : i + 1}
              </div>
              <div style={{
                fontSize: 12, fontWeight: state === 'active' ? 700 : 500,
                color: state === 'idle' ? '#94a3b8' : '#0f172a',
              }}>{label}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// Radio dot
function Radio({ selected, color = '#0D9488' }) {
  return (
    <div style={{
      width: 20, height: 20, borderRadius: 10,
      border: `2px solid ${selected ? color : '#cbd5e1'}`,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      flexShrink: 0, transition: 'all 0.18s',
    }}>
      {selected && <div style={{ width: 10, height: 10, borderRadius: 5, background: color }} />}
    </div>
  );
}

// Gradient CTA (like "Pay using Al Tareq")
function PayButton({ onClick, label = 'Pay using Al Tareq', disabled }) {
  return (
    <button onClick={onClick} disabled={disabled} style={{
      width: '100%', height: 52, borderRadius: 26, border: 'none',
      background: disabled ? '#cbd5e1' : 'linear-gradient(90deg, #0D9488 0%, #1C2B4A 100%)',
      color: '#fff', fontWeight: 700, fontSize: 15,
      display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
      cursor: disabled ? 'not-allowed' : 'pointer',
      boxShadow: disabled ? 'none' : '0 8px 20px rgba(13,148,136,0.3)',
      fontFamily: 'inherit', transition: 'transform 0.1s',
    }}
    onMouseDown={e => !disabled && (e.currentTarget.style.transform = 'scale(0.98)')}
    onMouseUp={e => !disabled && (e.currentTarget.style.transform = 'scale(1)')}
    onMouseLeave={e => !disabled && (e.currentTarget.style.transform = 'scale(1)')}>
      <div style={{ width: 22, height: 22, borderRadius: 11, background: 'rgba(255,255,255,0.25)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {Icons.check('#fff', 14)}
      </div>
      {label}
    </button>
  );
}

// Card container
function Card({ children, style = {} }) {
  return (
    <div style={{
      background: '#fff', borderRadius: 18, padding: 18,
      boxShadow: '0 1px 2px rgba(15,23,42,0.04), 0 4px 16px rgba(15,23,42,0.04)',
      ...style,
    }}>{children}</div>
  );
}

window.Phone = Phone;
window.TopBar = TopBar;
window.Stepper = Stepper;
window.Radio = Radio;
window.PayButton = PayButton;
window.Card = Card;


// ============================================================
// Screen 1 — TPP Start: Payment summary + method selection
// ============================================================
function S_TPPStart({ ctx, onNext, onBack, theme }) {
  const [method, setMethod] = React.useState('altareq');
  const t = theme;
  return (
    <>
      <TopBar title="PAYLINK" color="#6D28D9" onBack={onBack} />
      <div style={{ flex: 1, overflowY: 'auto', background: t.bg, padding: '18px 16px 30px' }}>
        {/* Payment summary card */}
        <Card style={{ marginBottom: 16, background: t.card }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 14 }}>
            <div style={{ width: 34, height: 34, borderRadius: 17, background: 'rgba(13,148,136,0.12)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              {Icons.wallet('#0D9488', 18)}
            </div>
            <div style={{ flex: 1, fontSize: 15, fontWeight: 600, color: t.text }}>Payment Total</div>
            <div style={{ fontSize: 17, fontWeight: 800, color: t.text }}>AED {ctx.amount}</div>
          </div>
          <Row label="Payee Name" value="Abdulaziz Mohammed" t={t} />
          <Row label="IBAN" value="AE07 0331 2345 6789 0123 456" t={t} />
          <Row label="Payment Reference" value="Invoice 123" t={t} />
          <Row label="Payment Purpose" value="Goods bought" t={t} last />
        </Card>

        {/* Fill in your data (shown for Partial/No-match scenarios where user types payee) */}
        {ctx.showPayeeForm && (
          <Card style={{ marginBottom: 16, background: t.card }}>
            <div style={{ fontSize: 15, fontWeight: 700, color: t.text, marginBottom: 12 }}>Fill in with your data</div>
            <FormField label="Payee Name" value={ctx.typedPayeeName} t={t} />
            <div style={{ height: 10 }} />
            <FormField label="IBAN" value="AE07 0331 234567890 123456" t={t} />
          </Card>
        )}

        {/* Payment method */}
        <Card style={{ background: t.card }}>
          <div style={{ fontSize: 15, fontWeight: 700, color: t.text, marginBottom: 14 }}>Select payment method</div>
          <MethodRow
            label="Credit / Debit Card"
            icon={Icons.card(t.muted, 18)}
            selected={method === 'card'}
            onClick={() => setMethod('card')}
            t={t}
          />
          <MethodRow
            label="PayPal"
            icon={<div style={{ width: 18, height: 18, borderRadius: 4, background: '#1e40af', color: '#fff', fontWeight: 900, fontSize: 11, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>P</div>}
            selected={method === 'paypal'}
            onClick={() => setMethod('paypal')}
            t={t}
          />
          {/* Highlighted Al Tareq option */}
          <button onClick={() => setMethod('altareq')} style={{
            width: '100%', marginTop: 10, height: 52, borderRadius: 14, border: 'none',
            background: method === 'altareq' ? 'linear-gradient(90deg,#1C2B4A,#0D9488)' : '#f1f5f9',
            display: 'flex', alignItems: 'center', padding: '0 14px', gap: 10,
            cursor: 'pointer', fontFamily: 'inherit', transition: 'all 0.2s',
          }}>

// Screen 6 — Biometric / PIN auth (Touch ID default, can switch)
// ============================================================
function S_Biometric({ ctx, onSuccess, onBack, theme }) {
  const [method, setMethod] = React.useState('touch'); // touch | face | pin
  const [state, setState] = React.useState('idle'); // idle | scanning | success | fail
  const [pin, setPin] = React.useState('');
  const t = theme;

  const triggerTouch = () => {
    if (state !== 'idle') return;
    setState('scanning');
    setTimeout(() => {
      setState('success');
      setTimeout(onSuccess, 900);
    }, 1400);
  };

  const triggerFace = () => {
    if (state !== 'idle') return;
    setState('scanning');
    setTimeout(() => {
      setState('success');
      setTimeout(onSuccess, 900);
    }, 1800);
  };

  const onPinTap = (k) => {
    if (state !== 'idle') return;
    if (k === 'del') return setPin(p => p.slice(0, -1));
    if (pin.length >= 6) return;
    const next = pin + k;
    setPin(next);
    if (next.length === 6) {
      setState('scanning');
      setTimeout(() => {
        setState('success');
        setTimeout(onSuccess, 800);
      }, 700);
    }
  };

  return (
    <>
      <TopBar title="ADCB" color="#E31E24" onBack={onBack} />
      <div style={{ flex: 1, overflowY: 'auto', background: t.bg }}>
        <div style={{ background: t.card, padding: '18px 0 0', textAlign: 'center' }}>
          <div style={{ display: 'inline-block' }}><Brands.AlTareq color={t.text} /></div>
        </div>
        <div style={{ background: t.card }}>
          <Stepper active={1} />
        </div>

        {/* Method tabs */}
        <div style={{ padding: '16px 16px 10px', display: 'flex', gap: 8 }}>
          <MethodTab icon={Icons.fingerprint} label="Touch ID" active={method === 'touch'} onClick={() => { setMethod('touch'); setState('idle'); setPin(''); }} t={t} />
          <MethodTab icon={Icons.faceId} label="Face ID" active={method === 'face'} onClick={() => { setMethod('face'); setState('idle'); setPin(''); }} t={t} />
          <MethodTab label="PIN" active={method === 'pin'} onClick={() => { setMethod('pin'); setState('idle'); setPin(''); }} t={t} />
        </div>

        <div style={{ padding: '10px 16px 30px', display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
          {method === 'touch' && (
            <TouchPane state={state} onTap={triggerTouch} t={t} />
          )}
          {method === 'face' && (
            <FacePane state={state} onTap={triggerFace} t={t} />
          )}
          {method === 'pin' && (
            <PinPane pin={pin} state={state} onTap={onPinTap} t={t} />
          )}
        </div>
      </div>
    </>
  );
}

function MethodTab({ icon, label, active, onClick, t }) {
  return (
    <button onClick={onClick} style={{
      flex: 1, height: 40, borderRadius: 20,
      border: `1.5px solid ${active ? '#E31E24' : t.border}`,
      background: active ? 'rgba(227,30,36,0.06)' : t.card,
      color: active ? '#E31E24' : t.text, fontWeight: 600, fontSize: 12,
      cursor: 'pointer', fontFamily: 'inherit',
      display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
    }}>
      {icon && icon(active ? '#E31E24' : t.text, 16)}
      {label}
    </button>
  );
}

function TouchPane({ state, onTap, t }) {
  const color = state === 'success' ? '#10b981' : state === 'scanning' ? '#E31E24' : '#0D9488';
  const msg = state === 'success' ? 'Authenticated' : state === 'scanning' ? 'Scanning…' : 'Touch the sensor to authenticate';

  return (
    <>
      <div style={{ fontSize: 15, fontWeight: 700, color: t.text, marginTop: 20 }}>Touch ID Authentication</div>
      <div style={{ fontSize: 12, color: t.muted, marginTop: 6, textAlign: 'center' }}>
        Hold your finger on the sensor to confirm the payment
      </div>

      <button onClick={onTap} style={{
        marginTop: 40, width: 180, height: 180, borderRadius: 90,
        background: t.card, border: `2px solid ${color}`,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        cursor: state === 'idle' ? 'pointer' : 'default',
        position: 'relative',
        boxShadow: state !== 'idle' ? `0 0 0 12px ${color}20, 0 0 0 24px ${color}10` : 'none',
        transition: 'box-shadow 0.3s',
      }}>
        {/* pulse ring */}
        {state === 'scanning' && (
          <div style={{
            position: 'absolute', inset: -10, borderRadius: 100,
            border: `2px solid ${color}`, opacity: 0.5,
            animation: 'pulseRing 1.2s ease-out infinite',
          }} />
        )}
        {state === 'success'
          ? Icons.check(color, 80)
          : Icons.fingerprint(color, 100)}
      </button>

      <div style={{ marginTop: 24, fontSize: 14, color, fontWeight: 600 }}>{msg}</div>

      {state === 'idle' && (
        <div style={{ marginTop: 14, fontSize: 11, color: t.muted, fontStyle: 'italic' }}>
          (demo — tap the fingerprint to simulate)
        </div>
      )}
    </>
  );
}

function FacePane({ state, onTap, t }) {
  const color = state === 'success' ? '#10b981' : state === 'scanning' ? '#E31E24' : '#0D9488';
  const msg = state === 'success' ? 'Face recognized' : state === 'scanning' ? 'Scanning your face…' : 'Look at the camera to authenticate';

  return (
    <>
      <div style={{ fontSize: 15, fontWeight: 700, color: t.text, marginTop: 20 }}>Face ID Authentication</div>
      <div style={{ fontSize: 12, color: t.muted, marginTop: 6, textAlign: 'center' }}>
        Face the camera and hold still
      </div>

      <button onClick={onTap} style={{
        marginTop: 40, width: 180, height: 180, borderRadius: 36,
        background: t.card, border: `2px solid ${color}`,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        cursor: state === 'idle' ? 'pointer' : 'default',
        position: 'relative',
      }}>
        {state === 'scanning' && (
          <div style={{
            position: 'absolute', left: 0, right: 0, height: 3,
            background: `linear-gradient(90deg, transparent, ${color}, transparent)`,
            animation: 'scanLine 1.4s ease-in-out infinite',
          }} />
        )}
        {state === 'success'
          ? Icons.check(color, 80)
          : Icons.faceId(color, 100)}
      </button>

      <div style={{ marginTop: 24, fontSize: 14, color, fontWeight: 600 }}>{msg}</div>
    </>
  );
}

function PinPane({ pin, state, onTap, t }) {
  const keys = ['1','2','3','4','5','6','7','8','9','','0','del'];
  const success = state === 'success';

  return (
    <>
      <div style={{ fontSize: 15, fontWeight: 700, color: t.text, marginTop: 20 }}>PIN Authentication</div>
      <div style={{ fontSize: 12, color: t.muted, marginTop: 6, marginBottom: 18 }}>Enter your 6-digit PIN</div>

      {/* Dots */}
      <div style={{ display: 'flex', gap: 14, marginBottom: 26 }}>
        {Array.from({ length: 6 }).map((_, i) => {
          const filled = i < pin.length;
          return (
            <div key={i} style={{
              width: 14, height: 14, borderRadius: 7,
              background: filled ? (success ? '#10b981' : '#0D9488') : 'transparent',
              border: `2px solid ${filled ? (success ? '#10b981' : '#0D9488') : '#cbd5e1'}`,
              transition: 'all 0.15s',
            }} />
          );
        })}
      </div>

      {/* Keypad */}
      <div style={{
        display: 'grid', gridTemplateColumns: 'repeat(3, 72px)', gap: 12,
      }}>
        {keys.map((k, i) => {
          if (k === '') return <div key={i} />;
          return (
            <button key={i} onClick={() => onTap(k)} style={{
              width: 72, height: 72, borderRadius: 36, background: t.card,
              border: `1px solid ${t.border}`, color: t.text,
              fontSize: 24, fontWeight: 500, cursor: 'pointer', fontFamily: 'inherit',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              transition: 'all 0.1s',
            }}
            onMouseDown={e => e.currentTarget.style.background = t.inputBg}
            onMouseUp={e => e.currentTarget.style.background = t.card}
            onMouseLeave={e => e.currentTarget.style.background = t.card}>
              {k === 'del' ? (
                <svg width="22" height="18" viewBox="0 0 24 20"><path d="M7 1h13a2 2 0 012 2v14a2 2 0 01-2 2H7L1 10 7 1z" fill="none" stroke={t.text} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 6l7 7M17 6l-7 7" stroke={t.text} strokeWidth="1.6" strokeLinecap="round"/></svg>
              ) : k}
            </button>
          );
        })}
      </div>
    </>
  );
}

window.S_Biometric = S_Biometric;


// ============================================================
// Screen 7 — Thank you / complete
// ============================================================
function S_Complete({ ctx, onFinish, theme }) {
  const t = theme;
  return (
    <>
      <TopBar title="PAYLINK" color="#6D28D9" showBack={false} />
      <div style={{ flex: 1, overflowY: 'auto', background: t.bg }}>
        <div style={{ background: t.card, padding: '18px 0 0', textAlign: 'center' }}>
          <div style={{ display: 'inline-block' }}><Brands.AlTareq color={t.text} /></div>
        </div>
        <div style={{ background: t.card }}>
          <Stepper active={2} />
        </div>

        <div style={{ padding: '16px 16px 30px' }}>
          <Card style={{ background: t.card, padding: '28px 20px' }}>
            <div style={{ textAlign: 'center' }}>
              <div style={{ fontSize: 20, fontWeight: 800, color: t.text, marginBottom: 16 }}>Thank you</div>
              <div style={{
                width: 68, height: 68, borderRadius: 34, margin: '0 auto 16',
                background: 'linear-gradient(135deg,#10b981,#059669)',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                boxShadow: '0 8px 20px rgba(16,185,129,0.35)',
                animation: 'pop 0.5s ease-out',
              }}>{Icons.check('#fff', 36)}</div>
              <div style={{ fontSize: 14, color: t.muted, marginBottom: 20 }}>
                Your Payment has been <b style={{ color: t.text }}>submitted</b>
              </div>
            </div>

            <div style={{ background: t.inputBg, borderRadius: 12, padding: 14 }}>
              <Row label="Payment Reference" value="Invoice 123" t={t} />
              <Row label="Payment Purpose" value="Goods bought" t={t} />
              <Row label="Total paid" value={`AED ${ctx.amount}`} t={t} />
              <Row label="Payee Name" value="Abdulaziz Mohammed" t={t} last />
            </div>
          </Card>

          <div style={{ height: 24 }} />
          <button onClick={onFinish} style={{
            width: '100%', height: 52, borderRadius: 26, border: 'none',
            background: '#0D9488', color: '#fff', fontWeight: 700, fontSize: 15,
            cursor: 'pointer', fontFamily: 'inherit',
            boxShadow: '0 6px 14px rgba(13,148,136,0.25)',
          }}>Finish</button>
        </div>
      </div>
    </>
  );
}

window.S_Complete = S_Complete;

</script>

<body>
<div id="root"></div>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "flow": "nomatch",
  "theme": "light",
  "accent": "teal",
  "stepper": "dots",
  "showScreenLabels": true
}/*EDITMODE-END*/;

const FLOWS = {
  match:   { label: 'Match',         amount: 100,  color: '#10b981', desc: 'Happy path — payee name matches account holder' },
  partial: { label: 'Partial Match', amount: 1000, color: '#f59e0b', desc: 'Name is similar but not exact' },
  nomatch: { label: 'No Match',      amount: 1000, color: '#ef4444', desc: 'Name does not match account holder' },
};

// 9-step flow (CoP + SIP payment journey)
const STEPS = [
  { key: 'tpp_start',    label: '01 PayLink · Payment + Method' },
  { key: 'consent',      label: '02 PayLink · Bank picker' },
  { key: 'permission',   label: '03 PayLink · Permission (CoP result)' },
  { key: 'redirect_lfi', label: '04 Redirect to ADCB' },
  { key: 'auth_splash',  label: '05 ADCB · Authentication' },
  { key: 'lfi_confirm',  label: '06 ADCB · Confirm Details' },
  { key: 'biometric',    label: '07 ADCB · SCA (Touch ID)' },
  { key: 'redirect_tpp', label: '08 Redirect back to PayLink' },
  { key: 'complete',     label: '09 PayLink · Receipt' },
];

// Endpoints called at each step — in the exact order they are invoked
// during the CoP + SIP payment journey. Displayed in the endpoint log.
const STEP_ENDPOINTS = {
  tpp_start:    [
    { method: 'GET',  path: '/api/v2.0/user-accounts',                caller: 'PayLink',  role: 'TPP',      note: 'Fetch user\u2019s linked OF accounts' }
  ],
  consent:      [
    { method: 'GET',  path: '/api/v2.0/participants',                  caller: 'PayLink',  role: 'TPP',      note: 'Fetch LFI directory (ADCB, ENBD, FAB\u2026) from OF Hub' }
  ],
  permission:   [
    { method: 'POST', path: '/api/v2.0/customers/action/cop-query',   caller: 'PayLink',  role: 'CoP',      note: 'Confirmation of Payee query \u2014 mandatory before consent (CBUAE)' }
  ],
  redirect_lfi: [
    { method: 'POST', path: '/api/v2.0/payment-consents/initiate',    caller: 'PayLink',  role: 'TPP',      note: 'Build PII payload, sign JWS, encrypt JWE' },
    { method: 'POST', path: '/api/v2.0/as/par',                        caller: 'PayLink',  role: 'Hub',      note: 'Pushed Authorisation Request \u2014 receive request_uri' },
    { method: 'GET',  path: '/api/v2.0/as/authorize?request_uri=\u2026', caller: 'PayLink',  role: 'Hub',      note: 'Redirect user to ADCB hosted auth with request_uri' }
  ],
  auth_splash:  [
    { method: 'GET',  path: '/mib/authorize',                         caller: 'Al Tareq', role: 'Hub',      note: 'CAAP mobile-in-browser handover to ADCB' }
  ],
  lfi_confirm:  [
    { method: 'GET',  path: '/lfi/consent/details',                    caller: 'ADCB',     role: 'LFI',      note: 'ADCB fetches consent payload to display to customer' },
    { method: 'GET',  path: '/lfi/accounts',                           caller: 'ADCB',     role: 'LFI',      note: 'List debtor accounts eligible to pay from' }
  ],
  biometric:    [
    { method: 'POST', path: '/lfi/auth/verify',                        caller: 'ADCB',     role: 'LFI',      note: 'Strong Customer Auth (Touch ID / Face ID / PIN)' },
    { method: 'POST', path: '/lfi/consent/authorize',                  caller: 'ADCB',     role: 'LFI',      note: 'Record customer authorisation on consent' }
  ],
  redirect_tpp: [
    { method: 'GET',  path: '/tpp/callback?code=\u2026&state=\u2026', caller: 'ADCB',     role: 'LFI',      note: 'Redirect back to PayLink callback with auth code' },
    { method: 'POST', path: '/api/v2.0/as/token',                      caller: 'PayLink',  role: 'TPP',      note: 'Exchange code for access token (PKCE + private_key_jwt)' },
    { method: 'POST', path: '/api/v2.0/payment-consents/callback',     caller: 'PayLink',  role: 'TPP',      note: 'Validate state + nonce, mark consent Authorised' }
  ],
  complete:     [
    { method: 'POST', path: '/api/v2.0/payments',                      caller: 'PayLink',  role: 'TPP',      note: 'PI-6 \u2014 submit signed payment (idempotency key, mTLS)' },
    { method: 'GET',  path: '/api/v2.0/payments/{id}',                 caller: 'PayLink',  role: 'TPP',      note: 'PI-8 \u2014 poll status until terminal (Accepted / Rejected)' }
  ]
};

const LIGHT = {
  bg: '#f1f5f9', card: '#fff', text: '#0F172A', muted: '#64748b',
  border: '#e2e8f0', inputBg: '#f8fafc',
};
const DARK = {
  bg: '#0f172a', card: '#1e293b', text: '#f1f5f9', muted: '#94a3b8',
  border: '#334155', inputBg: '#0f172a',
};

function App() {
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [flow, setFlow] = React.useState(tweaks.flow || 'match');
  const [stepIdx, setStepIdx] = React.useState(0);
  const [tweaksOpen, setTweaksOpen] = React.useState(false);
  const [dark, setDark] = React.useState(tweaks.theme === 'dark');

  // Persist position
  React.useEffect(() => {
    const saved = localStorage.getItem('cop_state');
    if (saved) {
      try {
        const s = JSON.parse(saved);
        if (s.flow) setFlow(s.flow);
        if (typeof s.stepIdx === 'number') setStepIdx(s.stepIdx);
      } catch (e) {}
    }
  }, []);
  React.useEffect(() => {
    localStorage.setItem('cop_state', JSON.stringify({ flow, stepIdx }));
  }, [flow, stepIdx]);

  // Tweaks host integration
  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent?.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);
  const saveTweak = (k, v) => {
    setTweaks(t => ({ ...t, [k]: v }));
    window.parent?.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };

  const theme = dark ? DARK : LIGHT;
  const flowInfo = FLOWS[flow];
  const ctx = {
    flow,
    amount: flowInfo.amount,
    showPayeeForm: flow !== 'match',
    typedPayeeName: flow === 'nomatch' ? 'Supplier A Ltd' : 'Abdulaziz M',
  };

  const step = STEPS[stepIdx].key;
  const go = (delta) => setStepIdx(i => Math.max(0, Math.min(STEPS.length - 1, i + delta)));
  const next = () => go(1);
  const back = () => go(-1);
  const reset = () => setStepIdx(0);

  // Navigate via flow picker
  const switchFlow = (f) => { setFlow(f); setStepIdx(0); saveTweak('flow', f); };

  // Render current screen
  const renderScreen = () => {
    switch (step) {
      case 'tpp_start':    return <S_TPPStart    ctx={ctx} theme={theme} onNext={next} onBack={back} />;
      case 'consent':      return <S_Consent     ctx={ctx} theme={theme} onNext={next} onBack={back} />;
      case 'permission':   return <S_Permission  ctx={ctx} theme={theme} onNext={next} onBack={back} onCancel={reset} />;
      case 'redirect_lfi': return <S_Redirection direction="to-lfi" onComplete={next} />;
      case 'auth_splash':  return <S_AuthSplash  onComplete={next} />;
      case 'lfi_confirm':  return <S_LFIConfirm  ctx={ctx} theme={theme} onNext={next} onBack={back} onCancel={reset} />;
      case 'biometric':    return <S_Biometric   ctx={ctx} theme={theme} onSuccess={next} onBack={back} />;
      case 'redirect_tpp': return <S_Redirection direction="to-tpp" onComplete={next} />;
      case 'complete':     return <S_Complete    ctx={ctx} theme={theme} onFinish={reset} />;
      default: return null;
    }
  };

  return (
    <div data-screen-label={`${flow} · ${STEPS[stepIdx].label}`} style={{
      minHeight: '100vh', display: 'flex', flexDirection: 'column',
      background: dark ? '#0f172a' : '#f1f5f9',
      transition: 'background 0.3s',
    }}>
      {/* Top app bar */}
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '18px 24px', borderBottom: `1px solid ${dark ? '#1e293b' : '#e2e8f0'}`,
        background: dark ? '#0b1220' : '#fff',
      }}>
        <div>
          <div style={{ fontSize: 16, fontWeight: 800, color: dark ? '#f1f5f9' : '#0F172A', letterSpacing: -0.3 }}>
            ADCB · CoP Query Flow Prototype
          </div>
          <div style={{ fontSize: 12, color: dark ? '#94a3b8' : '#475569', marginTop: 2 }}>
            PayLink (TPP) \u2192 Al Tareq (API Hub) \u2192 ADCB (LFI)
          </div>
        </div>
        <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
          <button onClick={() => setDark(d => { saveTweak('theme', d ? 'light' : 'dark'); return !d; })}
            title="Toggle theme" style={{
            width: 36, height: 36, borderRadius: 18, border: 'none',
            background: dark ? '#1e293b' : '#f1f5f9', cursor: 'pointer',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>
            {dark ? (
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="4" fill="#fbbf24"/><g stroke="#fbbf24" strokeWidth="2" strokeLinecap="round"><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.5 4.5l2.1 2.1M17.4 17.4l2.1 2.1M4.5 19.5l2.1-2.1M17.4 6.6l2.1-2.1"/></g></svg>
            ) : (
              <svg width="18" height="18" viewBox="0 0 24 24" fill="#334155"><path d="M20 14.5A8 8 0 119.5 4a7 7 0 0010.5 10.5z"/></svg>
            )}
          </button>
        </div>
      </div>

      {/* Flow picker */}
      <div style={{
        display: 'flex', gap: 10, padding: '16px 24px',
        background: dark ? '#0b1220' : '#fff',
        borderBottom: `1px solid ${dark ? '#1e293b' : '#e2e8f0'}`,
      }}>
        {Object.entries(FLOWS).map(([k, f]) => (
          <button key={k} onClick={() => switchFlow(k)} style={{
            padding: '10px 16px', borderRadius: 12,
            border: `1.5px solid ${flow === k ? f.color : (dark ? '#334155' : '#e2e8f0')}`,
            background: flow === k ? `${f.color}15` : 'transparent',
            cursor: 'pointer', fontFamily: 'inherit',
            display: 'flex', alignItems: 'center', gap: 8,
            transition: 'all 0.15s',
          }}>
            <div style={{ width: 8, height: 8, borderRadius: 4, background: f.color }} />
            <div style={{ fontWeight: 700, fontSize: 13, color: dark ? '#f1f5f9' : '#0F172A' }}>{f.label}</div>
            <div style={{ fontSize: 11, color: dark ? '#94a3b8' : '#64748b' }}>AED {f.amount}</div>
          </button>
        ))}
        <div style={{ flex: 1 }} />
        <div style={{ fontSize: 12, color: dark ? '#94a3b8' : '#64748b', alignSelf: 'center' }}>
          {flowInfo.desc}
        </div>
      </div>

      {/* Main area: step list + phone + next hint */}
      <div style={{
        flex: 1, display: 'flex', gap: 24, padding: 32,
        alignItems: 'flex-start', justifyContent: 'center',
      }}>
        {/* Step rail */}
        <div style={{
          width: 260, background: dark ? '#0b1220' : '#fff', borderRadius: 16,
          padding: 10, border: `1px solid ${dark ? '#1e293b' : '#e2e8f0'}`,
        }}>
          <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: 0.8, color: dark ? '#94a3b8' : '#64748b', padding: '10px 12px 6px', fontWeight: 700 }}>
            {STEPS.length} Steps
          </div>
          {STEPS.map((s, i) => {
            const active = i === stepIdx;
            const done = i < stepIdx;
            return (
              <button key={s.key} onClick={() => setStepIdx(i)} style={{
                width: '100%', display: 'flex', alignItems: 'center', gap: 10,
                padding: '10px 12px', borderRadius: 10, border: 'none',
                background: active ? `${flowInfo.color}15` : 'transparent',
                cursor: 'pointer', fontFamily: 'inherit', textAlign: 'left',
                marginBottom: 2, transition: 'all 0.1s',
              }}>
                <div style={{
                  width: 22, height: 22, borderRadius: 11, flexShrink: 0,
                  background: active ? flowInfo.color : done ? `${flowInfo.color}40` : (dark ? '#1e293b' : '#f1f5f9'),
                  color: active || done ? '#fff' : (dark ? '#94a3b8' : '#64748b'),
                  fontSize: 11, fontWeight: 700,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                }}>{done ? '✓' : i + 1}</div>
                <div style={{
                  fontSize: 12, fontWeight: active ? 700 : 500,
                  color: active ? (dark ? '#f1f5f9' : '#0F172A') : (dark ? '#94a3b8' : '#475569'),
                }}>{s.label}</div>
              </button>
            );
          })}
        </div>

        {/* Phone + endpoint log column */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
          <div key={`${flow}-${stepIdx}`} style={{ animation: 'slideIn 0.3s ease' }}>
            <Phone>
              <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
                {renderScreen()}
              </div>
            </Phone>
          </div>
          <EndpointLog stepIdx={stepIdx} dark={dark} accentColor={flowInfo.color} />
        </div>

        {/* Controls sidebar */}
        <div style={{
          width: 260, background: dark ? '#0b1220' : '#fff', borderRadius: 16,
          padding: 18, border: `1px solid ${dark ? '#1e293b' : '#e2e8f0'}`,
          display: 'flex', flexDirection: 'column', gap: 12,
        }}>
          <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: 0.8, color: dark ? '#94a3b8' : '#64748b', fontWeight: 700 }}>
            Navigation
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            <button onClick={back} disabled={stepIdx === 0} style={{
              flex: 1, height: 40, borderRadius: 10, border: 'none',
              background: dark ? '#1e293b' : '#f1f5f9', color: dark ? '#f1f5f9' : '#0F172A',
              fontWeight: 600, fontSize: 12, cursor: stepIdx === 0 ? 'not-allowed' : 'pointer',
              opacity: stepIdx === 0 ? 0.4 : 1, fontFamily: 'inherit',
            }}>← Back</button>
            <button onClick={next} disabled={stepIdx === STEPS.length - 1} style={{
              flex: 1, height: 40, borderRadius: 10, border: 'none',
              background: flowInfo.color, color: '#fff',
              fontWeight: 600, fontSize: 12, cursor: stepIdx === STEPS.length - 1 ? 'not-allowed' : 'pointer',
              opacity: stepIdx === STEPS.length - 1 ? 0.4 : 1, fontFamily: 'inherit',
            }}>Next →</button>
          </div>
          <button onClick={reset} style={{
            height: 36, borderRadius: 10, border: `1px solid ${dark ? '#334155' : '#e2e8f0'}`,
            background: 'transparent', color: dark ? '#94a3b8' : '#64748b',
            fontWeight: 600, fontSize: 12, cursor: 'pointer', fontFamily: 'inherit',
          }}>Restart flow</button>

          <div style={{ height: 1, background: dark ? '#1e293b' : '#e2e8f0', margin: '6px 0' }} />

          <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: 0.8, color: dark ? '#94a3b8' : '#64748b', fontWeight: 700 }}>
            Current step
          </div>
          <div style={{ fontSize: 13, fontWeight: 700, color: dark ? '#f1f5f9' : '#0F172A' }}>
            {STEPS[stepIdx].label}
          </div>
          <div style={{ fontSize: 11, color: dark ? '#94a3b8' : '#64748b', lineHeight: 1.6 }}>
            {stepHint(step, flow)}
          </div>

          <div style={{ height: 1, background: dark ? '#1e293b' : '#e2e8f0', margin: '6px 0' }} />

          <div style={{ fontSize: 10, color: dark ? '#64748b' : '#94a3b8', lineHeight: 1.5 }}>
            ADCB Open Finance CoP prototype. PayLink is a fictional TPP merchant; Al Tareq is the CBUAE API Hub; ADCB is the user\u2019s LFI.
          </div>
        </div>
      </div>

      {/* Tweaks panel */}
      {tweaksOpen && (
        <div style={{
          position: 'fixed', bottom: 20, right: 20, width: 280,
          background: dark ? '#0b1220' : '#fff', borderRadius: 16,
          boxShadow: '0 20px 60px rgba(0,0,0,0.2)',
          border: `1px solid ${dark ? '#334155' : '#e2e8f0'}`,
          padding: 16, zIndex: 1000,
        }}>
          <div style={{ fontSize: 14, fontWeight: 800, color: dark ? '#f1f5f9' : '#0F172A', marginBottom: 12 }}>Tweaks</div>
          <TweakGroup label="Flow" value={flow} options={[['match','Match'],['partial','Partial'],['nomatch','No Match']]} onChange={switchFlow} dark={dark} />
          <TweakGroup label="Theme" value={dark ? 'dark' : 'light'} options={[['light','Light'],['dark','Dark']]} onChange={v => { setDark(v === 'dark'); saveTweak('theme', v); }} dark={dark} />
        </div>
      )}
    </div>
  );
}

// ────────────────────────────────────────────────────────────
// EndpointLog — shows every API endpoint that has been called
// up to (and including) the current step, in the exact order
// they were invoked during the CoP + SIP journey.
// ────────────────────────────────────────────────────────────
function EndpointLog({ stepIdx, dark, accentColor }) {
  // Build a flat, ordered list by walking STEPS from 0..stepIdx and
  // concatenating each step's endpoints in declaration order.
  const calls = [];
  for (let i = 0; i <= stepIdx; i++) {
    const key = STEPS[i].key;
    const list = STEP_ENDPOINTS[key] || [];
    list.forEach((ep) => calls.push({ ...ep, stepNum: i + 1, stepLabel: STEPS[i].label }));
  }

  const methodColors = {
    GET:    { bg: '#EFF6FF', fg: '#1D4ED8', dbg: '#1E3A8A', dfg: '#93C5FD' },
    POST:   { bg: '#ECFDF5', fg: '#047857', dbg: '#064E3B', dfg: '#6EE7B7' },
    PUT:    { bg: '#FEF3C7', fg: '#B45309', dbg: '#78350F', dfg: '#FCD34D' },
    DELETE: { bg: '#FEE2E2', fg: '#B91C1C', dbg: '#7F1D1D', dfg: '#FCA5A5' },
  };
  const roleColors = {
    TPP: '#6D28D9', Hub: '#0D9488', LFI: '#E31E24', CoP: '#F59E0B',
  };

  const panelBg = dark ? '#0b1220' : '#fff';
  const panelBorder = dark ? '#1e293b' : '#e2e8f0';
  const rowBg = dark ? '#0f172a' : '#F8FAFC';
  const rowBorder = dark ? '#1e293b' : '#e2e8f0';

  return (
    <div style={{
      width: 390, background: panelBg, borderRadius: 16,
      padding: 14, border: `1px solid ${panelBorder}`,
      maxHeight: 420, display: 'flex', flexDirection: 'column',
    }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
        <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: 0.8, color: dark ? '#94a3b8' : '#64748b', fontWeight: 700 }}>
          API Endpoints Called
        </div>
        <div style={{
          fontSize: 10, fontWeight: 700, padding: '3px 8px', borderRadius: 10,
          background: `${accentColor}20`, color: accentColor,
        }}>
          {calls.length} {calls.length === 1 ? 'call' : 'calls'}
        </div>
      </div>

      <div style={{
        flex: 1, overflowY: 'auto', display: 'flex', flexDirection: 'column', gap: 6,
        paddingRight: 2,
      }}>
        {calls.length === 0 && (
          <div style={{ fontSize: 11, color: dark ? '#64748b' : '#94a3b8', padding: '14px 4px', fontStyle: 'italic' }}>
            No endpoints called yet. Advance the flow to populate the log.
          </div>
        )}
        {calls.map((c, idx) => {
          const mc = methodColors[c.method] || methodColors.GET;
          const roleColor = roleColors[c.role] || '#64748b';
          return (
            <div key={idx} style={{
              background: rowBg, border: `1px solid ${rowBorder}`,
              borderRadius: 10, padding: '8px 10px',
              display: 'flex', flexDirection: 'column', gap: 4,
            }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <div style={{
                  fontSize: 9, fontWeight: 700, width: 18, textAlign: 'center',
                  color: dark ? '#64748b' : '#94a3b8', fontVariantNumeric: 'tabular-nums',
                }}>{String(idx + 1).padStart(2, '0')}</div>
                <div style={{
                  background: dark ? mc.dbg : mc.bg,
                  color: dark ? mc.dfg : mc.fg,
                  fontSize: 10, fontWeight: 800, padding: '2px 6px', borderRadius: 4,
                  fontFamily: 'JetBrains Mono, Menlo, monospace', minWidth: 48, textAlign: 'center',
                }}>{c.method}</div>
                <div style={{
                  fontSize: 11, fontFamily: 'JetBrains Mono, Menlo, monospace',
                  color: dark ? '#e2e8f0' : '#0F172A', fontWeight: 600,
                  flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
                }}>{c.path}</div>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6, paddingLeft: 26 }}>
                <span style={{
                  fontSize: 9, fontWeight: 700, textTransform: 'uppercase', letterSpacing: 0.5,
                  padding: '1px 6px', borderRadius: 8,
                  background: `${roleColor}15`, color: roleColor,
                }}>{c.role}</span>
                <span style={{ fontSize: 10, color: dark ? '#94a3b8' : '#64748b' }}>
                  by <b style={{ color: dark ? '#cbd5e1' : '#334155' }}>{c.caller}</b> · step {c.stepNum}
                </span>
              </div>
              {c.note && (
                <div style={{ fontSize: 10, color: dark ? '#94a3b8' : '#64748b', paddingLeft: 26, lineHeight: 1.4 }}>
                  {c.note}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function TweakGroup({ label, value, options, onChange, dark }) {
  return (
    <div style={{ marginBottom: 12 }}>
      <div style={{ fontSize: 11, textTransform: 'uppercase', color: dark ? '#94a3b8' : '#64748b', fontWeight: 700, marginBottom: 6 }}>{label}</div>
      <div style={{ display: 'flex', gap: 4 }}>
        {options.map(([k, l]) => (
          <button key={k} onClick={() => onChange(k)} style={{
            flex: 1, padding: '7px 8px', borderRadius: 8, border: 'none',
            background: value === k ? '#0D9488' : (dark ? '#1e293b' : '#f1f5f9'),
            color: value === k ? '#fff' : (dark ? '#f1f5f9' : '#0F172A'),
            fontSize: 11, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit',
          }}>{l}</button>
        ))}
      </div>
    </div>
  );
}

function stepHint(step, flow) {
  const hints = {
    tpp_start:    'Pick a payment method. "Pay by bank using Al Tareq" routes you through the CBUAE Open Finance CoP + SIP rail.',
    consent:      'Choose to select by account or by bank, then pick your bank from the list. Type to filter.',
    permission:   flow === 'match' ? 'Payee name confirmed. Tap Pay using Al Tareq to continue.' : flow === 'partial' ? 'Name is similar but not exact \u2014 amber warning shown, user can continue at risk.' : 'Name does not match \u2014 strong red warning shown.',
    redirect_lfi: 'Secure redirect to ADCB. Auto-advances in ~2s.',
    auth_splash:  'Brief ADCB authentication interstitial.',
    lfi_confirm:  'ADCB shows the payment details and asks which account to pay from.',
    biometric:    'Tap the fingerprint to simulate Touch ID. Swap to Face ID or PIN with the tabs.',
    redirect_tpp: 'Secure redirect back to PayLink.',
    complete:     'Payment submitted via PI-6. Tap Finish to restart.',
  };
  return hints[step] || '';
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
